<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1f6feb"/>
    </linearGradient>
    <linearGradient id="wave1grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="wave2grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bg)"/>

  <!-- Wave bottom layer -->
  <path d="M0,140 C200,100 400,160 600,130 C800,100 1000,150 1200,120 L1200,200 L0,200 Z" fill="url(#wave1grad)"/>
  <!-- Wave top layer -->
  <path d="M0,160 C150,140 350,175 550,155 C750,135 950,165 1200,145 L1200,200 L0,200 Z" fill="url(#wave2grad)"/>

  <!-- Decorative dots -->
  <circle cx="80" cy="40" r="3" fill="#58a6ff" opacity="0.5"/>
  <circle cx="1120" cy="50" r="3" fill="#58a6ff" opacity="0.5"/>
  <circle cx="50" cy="80" r="2" fill="#1f6feb" opacity="0.4"/>
  <circle cx="1150" cy="90" r="2" fill="#1f6feb" opacity="0.4"/>
  <circle cx="110" cy="60" r="1.5" fill="#58a6ff" opacity="0.3"/>
  <circle cx="1090" cy="30" r="1.5" fill="#58a6ff" opacity="0.3"/>

  <!-- Main title -->
  <text x="600" y="90" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700" fill="#e6edf3" text-anchor="middle" letter-spacing="-1">Lucas Angoloti Cerrada</text>

  <!-- Subtitle -->
  <text x="600" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="400" fill="#8b949e" text-anchor="middle" letter-spacing="1">🎓 ASIR Student  |  Future DevOps &amp; Cybersecurity Engineer</text>
</svg>
