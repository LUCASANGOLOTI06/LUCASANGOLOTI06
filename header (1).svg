<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="60%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <linearGradient id="waveGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0"/>
      <stop offset="30%" stop-color="#58a6ff" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#58a6ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bgGrad)"/>

  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#1f6feb" opacity="0.12"/>
  </pattern>
  <rect width="1200" height="220" fill="url(#dots)"/>

  <!-- Wave layers -->
  <path d="M0,155 C180,125 360,175 540,148 C720,120 900,165 1080,140 L1200,135 L1200,220 L0,220 Z" fill="url(#waveGrad1)"/>
  <path d="M0,172 C150,155 320,185 500,168 C680,150 860,178 1050,160 L1200,155 L1200,220 L0,220 Z" fill="url(#waveGrad2)"/>

  <!-- Accent line -->
  <line x1="200" y1="148" x2="1000" y2="148" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- Corner decorations -->
  <circle cx="60" cy="35" r="2.5" fill="#58a6ff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="90" cy="55" r="1.5" fill="#1f6feb" opacity="0.5"/>
  <circle cx="40" cy="65" r="1.5" fill="#58a6ff" opacity="0.4"/>
  <circle cx="1140" cy="35" r="2.5" fill="#58a6ff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="1110" cy="55" r="1.5" fill="#1f6feb" opacity="0.5"/>
  <circle cx="1160" cy="65" r="1.5" fill="#58a6ff" opacity="0.4"/>

  <!-- Bracket decorations -->
  <text x="155" y="100" font-family="monospace" font-size="28" fill="#1f6feb" opacity="0.35">&lt;</text>
  <text x="1025" y="100" font-family="monospace" font-size="28" fill="#1f6feb" opacity="0.35">/&gt;</text>

  <!-- Main name -->
  <text x="600" y="92" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="44" font-weight="700" fill="#e6edf3"
        text-anchor="middle" letter-spacing="-0.5" filter="url(#glow)">
    Lucas Angoloti Cerrada
  </text>

  <!-- Subtitle -->
  <text x="600" y="128" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="400" fill="#8b949e"
        text-anchor="middle" letter-spacing="2">
    ASIR STUDENT  ·  FUTURE DEVOPS  &amp;  CYBERSECURITY ENGINEER
  </text>
</svg>
