<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="110" viewBox="0 0 1200 110">
  <defs>
    <linearGradient id="bgF" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="wF1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="wF2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="lineF" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0"/>
      <stop offset="30%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="110" fill="url(#bgF)"/>
  <pattern id="dotsF" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#1f6feb" opacity="0.1"/>
  </pattern>
  <rect width="1200" height="110" fill="url(#dotsF)"/>

  <!-- Waves top -->
  <path d="M0,55 C200,30 400,65 600,42 C800,18 1000,55 1200,35 L1200,0 L0,0 Z" fill="url(#wF1)"/>
  <path d="M0,70 C180,50 380,75 580,58 C780,40 980,68 1200,50 L1200,0 L0,0 Z" fill="url(#wF2)"/>

  <!-- Accent line -->
  <line x1="200" y1="58" x2="1000" y2="58" stroke="url(#lineF)" stroke-width="1"/>

  <!-- Quote -->
  <text x="600" y="88" font-family="'Segoe UI', Arial, sans-serif"
        font-size="13" font-style="italic" fill="#58a6ff" opacity="0.75"
        text-anchor="middle" letter-spacing="0.5">
    "El conocimiento es el mejor exploit." 🔐
  </text>
</svg>
